<h2 mat-dialog-title>{{ isEditMode ? 'Editar Estudiante' : 'Registrar Nuevo Estudiante' }}</h2>
    
    <mat-dialog-content class="dialog-content">
      <form [formGroup]="form" class="form-grid">
        
        <mat-form-field appearance="outline">
          <mat-label>Tipo Documento</mat-label>
          <mat-select formControlName="tipoDocumento">
            <mat-option value="CC">Cédula de Ciudadanía</mat-option>
            <mat-option value="TI">Tarjeta de Identidad</mat-option>
            <mat-option value="CE">Cédula de Extranjería</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Número Documento</mat-label>
          <input matInput formControlName="numeroDocumento" placeholder="1012345678">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre Completo</mat-label>
          <input matInput formControlName="nombreCompleto" placeholder="Ej: Juan Pérez">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Correo Electrónico</mat-label>
          <input matInput type="email" formControlName="correo" placeholder="estudiante@correo.edu.co">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Teléfono</mat-label>
          <input matInput formControlName="telefono" placeholder="3001234567">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Programa Académico</mat-label>
          <input matInput formControlName="programaAcademico" placeholder="Ingeniería de Sistemas">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Semestre</mat-label>
          <input matInput type="number" formControlName="semestre" min="1" max="12">
        </mat-form-field>

        @if (isEditMode) {
          <div class="toggle-container full-width">
            <mat-slide-toggle formControlName="activo" color="primary">
              Estudiante Activo
            </mat-slide-toggle>
          </div>
        }

      </form>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button mat-button (click)="dialogRef.close(false)">Cancelar</button>
      <button mat-raised-button color="primary" [disabled]="form.invalid" (click)="guardar()">
        {{ isEditMode ? 'Actualizar' : 'Guardar' }}
      </button>
    </mat-dialog-actions>
