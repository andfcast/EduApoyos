services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ../EduApoyosBackend
      dockerfile: EduApoyosBackend.API/Dockerfile
    container_name: eduapoyos-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8085:8080"
    restart: unless-stopped
